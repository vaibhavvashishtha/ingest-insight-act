[project]
name = "api"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "core",
    "etl",
    "insights",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "python-jose[cryptography]>=3.3",
    "python-multipart>=0.0.9",
    "slowapi>=0.1.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]

[tool.uv.sources]
core = { workspace = true }
etl = { workspace = true }
insights = { workspace = true }
