[project]
name = "insights"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "core",
    "jinja2>=3.1",
    "anthropic>=0.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/insights"]

[tool.uv.sources]
core = { workspace = true }
