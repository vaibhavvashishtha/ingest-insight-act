[project]
name = "mcp_server"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "core",
    "etl",
    "insights",
    "fastmcp>=0.9",
    "uvicorn[standard]>=0.29",
    "python-jose[cryptography]>=3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_server"]

[tool.uv.sources]
core = { workspace = true }
etl = { workspace = true }
insights = { workspace = true }
