[project]
name = "etl"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "core",
    "celery>=5.3",
    "redis>=5.0",
    "kombu>=5.3",
    "anthropic>=0.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etl"]

[tool.uv.sources]
core = { workspace = true }
